<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baddies Boutique</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="./Dresses/eda1ded52aa02ae19acb73dac2f31928.jpg" type="image/x-icon">
</head>

<body>
    <div class="containered">
            <div class="rain">
                <div class="signup-box">
    <h1>Create Account</h1>
    <p class="subtitle">Welcome to Baddies-Boutique</p>
    
    <!-- action="index.html" = where user goes after sign up -->
    <form>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Jane Doe" required>
      </div>
      
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@email.com" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min 8 characters" minlength="8" required>
      </div>
      
      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" name="confirm" placeholder="Re-enter password" required>
      </div>
      
      <button type="submit" class="signup-btn">Sign Up</button>
    </form>
    
    <div class="login-link">
      Already have an account? <a href="login.html">Log in</a>
    </div>
  </div>
           
    </div>
            </div>

</body>
</html>
