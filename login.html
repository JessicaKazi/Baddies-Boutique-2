     <div class="containered">

                <div class="signup-box">
    <h1>Log In</h1>
    <p class="subtitle">Welcome back to Baddies-Boutique</p>
    
    <!-- action="index.html" = where user goes after sign up -->
    <form>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@email.com" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min 8 characters" minlength="8" required>
      </div>
      <button type="submit" class="signup-btn"><a href="index.html">Log In</a></button>
    </form>
    
    <div class="login-link">
     Don't have an account? <a href="sign.html ">Sign Up</a>
    </div>
  </div>
