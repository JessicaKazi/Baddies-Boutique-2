<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-Out</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <header>
         <nav class="navbar">
        <ul class="nav-links">
            <li class="active"><a href="index.html">Home</a></li>
            <li class="active"><a href="products.html">Products</a></li>
            <div class="dropdown">
                <button class="dropbtn">
                    Categories
                </button>
                <div class="dropdown-content">
                    <li class="active"><a href="products.html">Dresses</a></li>
                    <li class="active"><a href="products.html">Shoes</a></li>
                    <li class="active"><a href="products.html">Accessories</a></li>
                </div>
            </div>
            <li class="active"><a href="index.html">About Us</a></li>
            <li class="active"><a href="#contact">Contact Us</a></li>
            <li><a href="checkout.html"><img class="profile-icon" src="Icon/cart-shopping.png"></a></li>
            <li><a href="sign.html"><img class="profile-icon" src="Icon/profile.png"></a></li>
        </ul>
    </nav>
    </header>

         <h1 class="second-heading-title">Check-Out</h1>
<div class="third-container">
        <form >
            <div class="row">
                <div class="column">
                    <h3 class="first-title">Personal details</h3>
                    <div class="input-box">
                        <span>Full Name :</span>
                        <input type="text" placeholder="John Doe ">
                    </div>
                    <div class="input-box">
                        <span>Email :</span>
                        <input type="email" placeholder="example@example.com">
                    </div>
                    <div class="input-box">
                        <span>Address :</span>
                        <input type="text" placeholder="Room - Street - Locality">
                    </div>
                    <div class="input-box">
                        <span>City :</span>
                        <input type="text" placeholder="Johannesburg">
                    </div>

                    <div class="flex">
                        <div class="input-box">
                            <span>State :</span>
                            <input type="text" placeholder="South Africa">
                        </div>
                        <div class="input-box">
                            <span>Zip Code :</span>
                            <input type="number" placeholder="(+27) 000 0000">
                        </div>
                    </div>
                </div>

                <div class="column">
                    <h3 class="second-title">Payment</h3>
                    <div class="input-box">
                        <span>Cards Accepted :</span>
                        <img src="/Icon/imgcards.png" alt="A Selection of Cards Option Image">
                    </div>
                    <div class="input-box">
                        <span>Name On Card :</span>
                        <input type="text" placeholder="Mr. John Doe">
                    </div>
                    <div class="input-box">
                        <span>Credit Card Number :</span>
                        <input type="number" placeholder="1111 2222 3333 4444">
                    </div>
                    <div class="input-box">
                        <span>Exp. Month :</span>
                        <input type="text" placeholder="August">
                    </div>
                
                    <div class="flex">
                        <div class="input-box">
                            <span>Exp. Year :</span>
                            <input type="number" placeholder="2026">
                        </div>
                        <div class="input-box">
                            <span>CVV :</span>
                            <input type="number" placeholder="123">
                        </div>
                    </div>
                </div>
            </div>

            <button type="submit" class="cards-btn">Submit</button>
        </form>
    </div>
</div>
</body>
</html>
